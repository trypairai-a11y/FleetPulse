services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: darb
      POSTGRES_PASSWORD: darb_secret
      POSTGRES_DB: darb
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://darb:darb_secret@postgres:5432/darb?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: darb-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: darb-jwt-refresh-secret-change-in-production
      PORT: "3001"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_PROXY_URL: http://backend:3001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
